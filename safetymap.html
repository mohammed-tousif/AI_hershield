<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Map | Women Safety App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBGXF_WodaMeP10oziYhG0NdqHw2fJogxM&libraries=places,directions&callback=initMap" defer></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #map {
            height: 500px;
            width: 100%;
            margin: 20px 0;
        }
        .container {
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
    </style>
</head>
<body>

    <h2>Google Maps Safe Route Finder</h2>

    <div class="container">
        <label>Start Location:</label>
        <input type="text" id="startLocation" class="form-control" placeholder="Enter start location">
        <button class="btn btn-primary mt-2" id="useCurrentLocation">Use Current Location</button>

        <label class="mt-3">Destination:</label>
        <input type="text" id="endLocation" class="form-control" placeholder="Enter destination">

        <button class="btn btn-success mt-3" id="findRoute">Find Safe Route</button>
    </div>

    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();

            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 12.9716, lng: 77.5946 }, // Default to Bangalore
                zoom: 12
            });

            directionsRenderer.setMap(map);

            // Initialize Google Places Autocomplete
            const startInput = document.getElementById("startLocation");
            const endInput = document.getElementById("endLocation");
            new google.maps.places.Autocomplete(startInput);
            new google.maps.places.Autocomplete(endInput);
        }

        document.getElementById("findRoute").addEventListener("click", () => {
            const start = document.getElementById("startLocation").value;
            const end = document.getElementById("endLocation").value;

            if (!start || !end) {
                alert("Please enter both start and destination locations.");
                return;
            }

            calculateRoute(start, end);
        });

        function calculateRoute(start, end) {
            const request = {
                origin: start,
                destination: end,
                travelMode: google.maps.TravelMode.DRIVING
            };

            directionsService.route(request, (result, status) => {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                } else {
                    alert("Could not calculate route: " + status);
                }
            });
        }

        document.getElementById("useCurrentLocation").addEventListener("click", () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const location = `${lat}, ${lng}`;
                    document.getElementById("startLocation").value = location;
                    map.setCenter({ lat, lng });
                }, () => {
                    alert("Could not get your location.");
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        });

        window.onload = initMap;
    </script>

</body>
</html>
