<!DOCTYPE html>
<html lang="en">

<head>
    <script src="/config.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Shield - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --gradient-start: #FF9A86;
            --gradient-middle: #FFB399;
            --gradient-end: #FFD6A6;
        }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Poppins', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            background: #FDF9F5;
        }

        .gradient-background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 80%, rgba(255,154,134,0.12) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,214,166,0.10) 0%, transparent 50%);
        }

        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
                    rgba(255,154,134,0.07) 0%,
                    rgba(7, 0, 0, 0.05) 25%,
                    transparent 50%);
            pointer-events: none;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .auth-card {
            background: #FFFFFF;
            border-radius: 28px;
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(255,154,134,0.18);
            border: 1px solid rgba(255,154,134,0.12);
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .auth-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h2 {
            font-weight: 800;
            color: #1F1209;
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            font-size: 1rem;
            font-weight: 500;
            color: #7A5C4F;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            gap: 1rem;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            user-select: none;
        }

        .auth-tab::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-middle));
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .auth-tab.active {
            color: var(--gradient-middle);
        }

        .auth-tab.active::after {
            transform: scaleX(1);
        }

        .form-control {
            border-radius: 12px;
            padding: 1rem 1.25rem;
            border: 2px solid rgba(0, 0, 0, 0.1);
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            color: var(--text-dark);
        }

        .form-control:focus {
            border-color: var(--gradient-middle);
            box-shadow: 0 0 0 4px rgba(255, 179, 153, 0.1);
        }

        .form-floating>label {
            padding: 1rem 1.25rem;
            font-weight: 500;
        }

        .btn-modern {
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-middle));
            border: none;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 179, 153, 0.2);
        }

        .btn-modern:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .social-login {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .social-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,154,134,0.10);
            color: #1F1209;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(255,154,134,0.15);
            font-size: 1.2rem;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255,154,134,0.25);
            background: var(--gradient-middle);
            color: #fff;
        }

        .form-check-input:checked {
            background-color: var(--gradient-middle);
            border-color: var(--gradient-middle);
        }

        .form-check-label {
            font-weight: 500;
            color: var(--text-dark);
        }

        .auth-form {
            display: none;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .auth-form.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 576px) {
            /* .auth-container's own 2rem padding + .auth-tabs' 1rem gap + each
               tab's 1rem padding left almost no room for 3 tabs side by side on
               a narrow screen — "Recover" was clipped at the viewport edge and
               "Sign Up" wrapped to two lines. Tightening all three reclaims
               enough width for all three tabs to sit on one line. */
            .auth-container {
                padding: 1rem;
            }

            .auth-card {
                padding: 1.75rem 1.25rem;
            }

            .auth-header h2 {
                font-size: 1.75rem;
            }

            .auth-tabs {
                gap: 0.25rem;
            }

            .auth-tab {
                padding: 0.75rem 0.25rem;
                font-size: 0.92rem;
            }
        }
    </style>
</head>

<body>
    <div class="gradient-background"></div>
    <div class="gradient-overlay"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Her Shield</h2>
                <p>Your Safety Companion</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
                <div class="auth-tab" onclick="switchTab('recover')">Recover</div>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="loginForm">
                <form onsubmit="return handleLogin(event)">
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com"
                            required>
                        <label for="loginEmail">Email address</label>
                    </div>
                    <div class="mb-3">
                        <div class="input-group">
                            <div class="form-floating flex-grow-1">
                                <input type="password" class="form-control" id="loginPassword" placeholder="Password" required style="border-right:0; border-radius: 12px 0 0 12px;">
                                <label for="loginPassword">Password</label>
                            </div>
                            <button class="btn btn-outline-secondary" type="button" id="toggleLoginPassword"
                                onclick="togglePasswordVisibility('loginPassword','toggleLoginPassword')"
                                style="border-left:0; border-radius:0 12px 12px 0; background:#fff; border-color:#dee2e6;"
                                title="Show/hide password">
                                <i class="fas fa-eye" id="toggleLoginPasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" onclick="switchTab('recover')" class="text-decoration-none"
                            style="color: var(--gradient-middle); font-weight: 500;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-modern w-100">Login</button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted fw-500">Or login with</p>
                    <div class="social-login">
                        <a href="#" class="social-btn" onclick="handleSocialLogin(event, 'google')"><i
                                class="fab fa-google"></i></a>
                        <a href="#" class="social-btn" onclick="handleSocialLogin(event, 'facebook')"><i
                                class="fab fa-facebook-f"></i></a>
                        <a href="#" class="social-btn" onclick="handleSocialLogin(event, 'apple')"><i
                                class="fab fa-apple"></i></a>
                    </div>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div class="auth-form" id="signupForm">
                <form onsubmit="return handleSignup(event)">
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="signupName" placeholder="Full Name" required>
                        <label for="signupName">Full Name</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="signupEmail" placeholder="name@example.com"
                            required>
                        <label for="signupEmail">Email address</label>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="tel" class="form-control" id="signupPhone" placeholder="Phone Number" required>
                        <label for="signupPhone">Phone Number</label>
                    </div>
                    <div class="mb-4">
                        <div class="input-group">
                            <div class="form-floating flex-grow-1">
                                <input type="password" class="form-control" id="signupPassword" placeholder="Password" required style="border-right:0; border-radius: 12px 0 0 12px;">
                                <label for="signupPassword">Password</label>
                            </div>
                            <button class="btn btn-outline-secondary" type="button" id="toggleSignupPassword"
                                onclick="togglePasswordVisibility('signupPassword','toggleSignupPassword')"
                                style="border-left:0; border-radius:0 12px 12px 0; background:#fff; border-color:#dee2e6;"
                                title="Show/hide password">
                                <i class="fas fa-eye" id="toggleSignupPasswordIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="termsCheck" required>
                        <label class="form-check-label" for="termsCheck">
                            I agree to the Terms of Service and Privacy Policy
                        </label>
                    </div>
                    <button type="submit" class="btn btn-modern w-100">Create Account</button>
                </form>
            </div>

            <!-- Password Recovery Form -->
            <div class="auth-form" id="recoverForm">
                <div class="text-center mb-4">
                    <h4 class="fw-600">Password Recovery</h4>
                    <p class="text-muted">Enter your email to receive recovery instructions</p>
                </div>
                <form onsubmit="return handleRecovery(event)">
                    <div class="form-floating mb-4">
                        <input type="email" class="form-control" id="recoverEmail" placeholder="name@example.com"
                            required>
                        <label for="recoverEmail">Email address</label>
                    </div>
                    <button type="submit" class="btn btn-modern w-100">Send Recovery Email</button>
                    <div class="text-center mt-3">
                        <a href="#" onclick="switchTab('login')" class="text-decoration-none"
                            style="color: var(--gradient-middle); font-weight: 500;">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    </div>

    <!-- Notification Modal -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 24px; overflow: hidden;">
                <div class="modal-header border-0 text-white" id="notificationHeader"
                    style="background: linear-gradient(135deg, var(--gradient-start), var(--gradient-middle));">
                    <h5 class="modal-title fw-bold" id="notificationTitle">Notification</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <div class="mb-3">
                        <i id="notificationIcon" class="fas fa-info-circle fa-3x text-primary"></i>
                    </div>
                    <p id="notificationMessage" class="mb-0 fs-5 text-dark">Message goes here</p>
                </div>
                <div class="modal-footer border-0 justify-content-center pb-4">
                    <button type="button" class="btn btn-modern px-4" data-bs-dismiss="modal">Okay</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import './firebase-config.js';
        import './firebase-auth.js';

        // Moving gradient effect
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            document.documentElement.style.setProperty('--mouse-x', `${x}px`);
            document.documentElement.style.setProperty('--mouse-y', `${y}px`);
        });

        // Tab switching with smooth transitions - EXPOSE GLOBALLY
        window.switchTab = function switchTab(tab) {
            // Update tab styles
            document.querySelectorAll('.auth-tab').forEach(t => {
                t.classList.remove('active');
                if (t.textContent.toLowerCase() === tab) {
                    t.classList.add('active');
                }
            });

            // Hide all forms with fade out
            document.querySelectorAll('.auth-form').forEach(form => {
                form.style.opacity = '0';
                form.style.transform = 'translateY(10px)';
                setTimeout(() => {
                    form.classList.remove('active');
                    if (form.id === `${tab}Form`) {
                        form.classList.add('active');
                        setTimeout(() => {
                            form.style.opacity = '1';
                            form.style.transform = 'translateY(0)';
                        }, 50);
                    }
                }, 300);
            });
        }

        // Notification Helper
        window.showNotification = function (title, message, type = 'info') {
            const modal = new bootstrap.Modal(document.getElementById('notificationModal'));
            const header = document.getElementById('notificationHeader');
            const icon = document.getElementById('notificationIcon');
            const titleEl = document.getElementById('notificationTitle');
            const msgEl = document.getElementById('notificationMessage');

            titleEl.textContent = title;
            msgEl.textContent = message;

            // Reset classes
            icon.className = 'fas fa-3x mb-3';

            if (type === 'success') {
                header.style.background = 'linear-gradient(135deg, #2ecc71, #27ae60)';
                icon.classList.add('fa-check-circle', 'text-success');
            } else if (type === 'error') {
                header.style.background = 'linear-gradient(135deg, #e74c3c, #c0392b)';
                icon.classList.add('fa-exclamation-circle', 'text-danger');
            } else {
                header.style.background = 'linear-gradient(135deg, var(--gradient-start), var(--gradient-middle))';
                icon.classList.add('fa-info-circle', 'text-primary');
            }

            modal.show();
        }

        // Form handlers with Firebase authentication - EXPOSE GLOBALLY
        window.handleLogin = async function handleLogin(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button');

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return false;
            }

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';

            try {
                const result = await window.authService.loginWithEmail(email, password);
                if (result.success) {
                    // Wait for Firebase auth state to propagate before redirecting
                    setTimeout(() => {
                        window.location.replace('dashboard.html');
                    }, 1000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                button.disabled = false;
                button.innerHTML = 'Login';
                showNotification('Login Failed', error.message, 'error');
            }

            return false;
        }

        window.handleSignup = async function handleSignup(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button');

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return false;
            }

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating account...';

            try {
                const result = await window.authService.registerWithEmail(email, password, name);
                if (result.success) {
                    button.disabled = false;
                    button.innerHTML = 'Create Account';
                    showNotification('Success', 'Account created successfully! Please log in.', 'success');
                    switchTab('login');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                button.disabled = false;
                button.innerHTML = 'Create Account';
                showNotification('Registration Failed', error.message, 'error');
            }

            return false;
        }

        window.handleRecovery = async function handleRecovery(event) {
            event.preventDefault();
            const form = event.target;
            const button = form.querySelector('button');

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return false;
            }

            const email = document.getElementById('recoverEmail').value;

            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Sending...';

            try {
                const result = await window.authService.resetPassword(email);
                if (result.success) {
                    button.disabled = false;
                    button.innerHTML = 'Send Recovery Email';
                    showNotification('Email Sent', 'Recovery instructions have been sent to your email.', 'success');
                    switchTab('login');
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                button.disabled = false;
                button.innerHTML = 'Send Recovery Email';
                showNotification('Error', 'Password reset failed: ' + error.message, 'error');
            }

            return false;
        }

        window.handleSocialLogin = async function handleSocialLogin(event, provider) {
            if (event) event.preventDefault();
            try {
                let result;
                switch (provider) {
                    case 'google':
                        result = await window.authService.loginWithGoogle();
                        break;
                    case 'facebook':
                        result = await window.authService.loginWithFacebook();
                        break;
                    case 'apple':
                        result = await window.authService.loginWithApple();
                        break;
                    default:
                        throw new Error('Unknown provider');
                }

                if (result.success) {
                    // Wait for Firebase auth state to propagate before redirecting
                    setTimeout(() => {
                        window.location.replace('dashboard.html');
                    }, 1000);
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                showNotification('Login Failed', error.message, 'error');
            }
        }
        // Password visibility toggle
        window.togglePasswordVisibility = function(inputId, btnId) {
            const input = document.getElementById(inputId);
            const icon = document.querySelector('#' + btnId + ' i');
            if (!input || !icon) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        };
    </script>
</body>

</html>
